<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Resize PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root { --blue-primary: #1e40af; --blue-light: #eff6ff; }
        body { background-color: #f8fafc; color: #334155; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="w-full max-w-6xl bg-white shadow-xl rounded-xl overflow-hidden border border-blue-100">
        
        <div class="bg-blue-600 text-white text-center py-5">
            <h1 class="text-2xl md:text-3xl font-bold">HỆ THỐNG RESIZE PDF</h1>
            <p class="text-blue-100 mt-2">Nhanh chóng - Tiện lợi - Bypass Limit Vercel</p>
        </div>

        <div class="p-6 bg-blue-50 grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="flex flex-col gap-4">
                <label class="font-semibold text-blue-800">1. Nhập file PDF:</label>
                <input type="file" id="fileInput" accept=".pdf" 
                    class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 cursor-pointer">
                
                <div class="flex items-center gap-2">
                    <span class="text-gray-400 text-sm font-medium">HOẶC</span>
                </div>
                
                <input type="url" id="urlInput" placeholder="Nhập đường dẫn URL PDF rồi nhấn Enter..." 
                    class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex flex-col gap-4">
                <label class="font-semibold text-blue-800">2. Cài đặt kích thước:</label>
                <select id="formatSelect" class="w-full px-4 py-2 border border-blue-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    <option value="A0">Khổ A0</option>
                    <option value="A1">Khổ A1</option>
                    <option value="A2">Khổ A2</option>
                    <option value="A3">Khổ A3</option>
                    <option value="A4" selected>Khổ A4</option>
                    <option value="A5">Khổ A5</option>
                    <option value="A6">Khổ A6</option>
                    <option value="A7">Khổ A7</option>
                    <option value="A8">Khổ A8</option>
                    <option value="A9">Khổ A9</option>
                    <option value="A10">Khổ A10</option>
                    <option value="Custom">Tùy chỉnh kích thước</option>
                </select>

                <div id="customSizeInputs" class="hidden grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-gray-600">Chiều rộng (mm)</label>
                        <input type="number" id="customW" placeholder="VD: 210" class="w-full px-3 py-2 mt-1 border border-blue-200 rounded-lg">
                    </div>
                    <div>
                        <label class="text-sm text-gray-600">Chiều cao (mm)</label>
                        <input type="number" id="customH" placeholder="VD: 297" class="w-full px-3 py-2 mt-1 border border-blue-200 rounded-lg">
                    </div>
                </div>
            </div>

        </div>

        <div class="p-4 flex justify-center bg-white border-b border-blue-100">
            <button id="processBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-all transform hover:scale-105">
                XỬ LÝ FILE PDF
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-blue-100">
            
            <div class="p-6 flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-lg text-blue-800">Đọc file PDF gốc</h2>
                    <button id="openOriginalBtn" class="px-4 py-1.5 bg-white border border-blue-600 text-blue-600 rounded hover:bg-blue-50 transition hidden">Mở</button>
                </div>
                <div class="w-full h-96 bg-gray-100 rounded-lg border border-gray-300 flex items-center justify-center overflow-hidden relative">
                    <span id="originalPlaceholder" class="text-gray-400">Chưa có file nào được nhập</span>
                    <iframe id="originalPreview" class="absolute inset-0 w-full h-full hidden"></iframe>
                </div>
            </div>

            <div class="p-6 flex flex-col gap-4 bg-blue-50/30">
                <div class="flex justify-between items-center">
                    <h2 class="font-bold text-lg text-blue-800">Tệp sau khi Resize</h2>
                    <div class="flex gap-2">
                        <button id="openResizedBtn" class="px-4 py-1.5 bg-white border border-blue-600 text-blue-600 rounded hover:bg-blue-50 transition hidden">Mở</button>
                        <button id="downloadBtn" class="px-4 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-700 transition hidden shadow-md">Tải xuống</button>
                    </div>
                </div>
                <div class="w-full h-96 bg-white rounded-lg border border-blue-200 flex items-center justify-center overflow-hidden relative">
                    <span id="resizedPlaceholder" class="text-blue-300">Kết quả sẽ hiển thị tại đây</span>
                    
                    <div id="loading" class="hidden absolute flex flex-col items-center">
                        <svg class="animate-spin h-8 w-8 text-blue-600 mb-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span class="text-blue-600 font-medium" id="loadingText">Đang xử lý...</span>
                    </div>

                    <iframe id="resizedPreview" class="absolute inset-0 w-full h-full hidden"></iframe>
                </div>
            </div>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const urlInput = document.getElementById('urlInput');
        const formatSelect = document.getElementById('formatSelect');
        const customSizeInputs = document.getElementById('customSizeInputs');
        const processBtn = document.getElementById('processBtn');
        const originalPreview = document.getElementById('originalPreview');
        const originalPlaceholder = document.getElementById('originalPlaceholder');
        const openOriginalBtn = document.getElementById('openOriginalBtn');
        const resizedPreview = document.getElementById('resizedPreview');
        const resizedPlaceholder = document.getElementById('resizedPlaceholder');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const openResizedBtn = document.getElementById('openResizedBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        let originalPdfUrl = null;
        let resizedPdfUrl = null;

        const PAPER_SIZES = {
            A0: [2384, 3370], A1: [1684, 2384], A2: [1191, 1684],
            A3: [842, 1191], A4: [595, 842], A5: [420, 595],
            A6: [298, 420], A7: [210, 298], A8: [147, 210],
            A9: [105, 147], A10: [74, 105]
        };

        formatSelect.addEventListener('change', (e) => {
            if (e.target.value === 'Custom') {
                customSizeInputs.classList.remove('hidden');
                customSizeInputs.classList.add('grid');
            } else {
                customSizeInputs.classList.add('hidden');
                customSizeInputs.classList.remove('grid');
            }
        });

        function showOriginalPreview(url) {
            originalPlaceholder.classList.add('hidden');
            originalPreview.src = url;
            originalPreview.classList.remove('hidden');
            openOriginalBtn.classList.remove('hidden');
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                urlInput.value = '';
                if (originalPdfUrl && originalPdfUrl.startsWith('blob:')) URL.revokeObjectURL(originalPdfUrl);
                originalPdfUrl = URL.createObjectURL(file);
                showOriginalPreview(originalPdfUrl);
            }
        });

        urlInput.addEventListener('change', (e) => {
            const url = e.target.value.trim();
            if (url) {
                fileInput.value = '';
                if (originalPdfUrl && originalPdfUrl.startsWith('blob:')) URL.revokeObjectURL(originalPdfUrl);
                originalPdfUrl = url;
                showOriginalPreview(originalPdfUrl);
            }
        });

        openOriginalBtn.addEventListener('click', () => {
            if (originalPdfUrl) window.open(originalPdfUrl, '_blank');
        });

        processBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            const url = urlInput.value.trim();
            const format = formatSelect.value;

            if (!file && !url) {
                alert('Vui lòng chọn file PDF hoặc nhập URL!');
                return;
            }

            let newWidth, newHeight;
            if (format === 'Custom') {
                const w = document.getElementById('customW').value;
                const h = document.getElementById('customH').value;
                if (!w || !h) {
                    alert('Vui lòng nhập đầy đủ Chiều rộng và Chiều cao!');
                    return;
                }
                newWidth = parseFloat(w) * 2.83465;
                newHeight = parseFloat(h) * 2.83465;
            } else {
                [newWidth, newHeight] = PAPER_SIZES[format];
            }

            // UI Loading setup
            resizedPreview.classList.add('hidden');
            resizedPlaceholder.classList.add('hidden');
            loading.classList.remove('hidden');
            openResizedBtn.classList.add('hidden');
            downloadBtn.classList.add('hidden');

            try {
                // CHIẾN THUẬT 1: NẾU LÀ FILE -> XỬ LÝ TRỰC TIẾP TRÊN TRÌNH DUYỆT (Bypass Vercel 4.5MB limit)
                if (file) {
                    loadingText.innerText = "Đang xử lý cục bộ...";
                    
                    const arrayBuffer = await file.arrayBuffer();
                    const { PDFDocument } = PDFLib;
                    
                    const originalPdf = await PDFDocument.load(arrayBuffer);
                    const newPdf = await PDFDocument.create();
                    
                    const embeddedPages = await newPdf.embedPdf(originalPdf);
                    for (const embeddedPage of embeddedPages) {
                        const page = newPdf.addPage([newWidth, newHeight]);
                        page.drawPage(embeddedPage, {
                            x: 0, y: 0,
                            width: newWidth, height: newHeight,
                        });
                    }

                    const pdfBytes = await newPdf.save();
                    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                    
                    if (resizedPdfUrl) URL.revokeObjectURL(resizedPdfUrl);
                    resizedPdfUrl = URL.createObjectURL(blob);
                } 
                // CHIẾN THUẬT 2: NẾU LÀ URL -> GỬI LÊN BACKEND NODE.JS VERCEL (Không bị limit vì payload URL rất nhẹ)
                else if (url) {
                    loadingText.innerText = "Đang gọi máy chủ xử lý...";
                    
                    const formData = new FormData();
                    formData.append('url', url);
                    formData.append('format', format);
                    if (format === 'Custom') {
                        formData.append('width', document.getElementById('customW').value);
                        formData.append('height', document.getElementById('customH').value);
                    }

                    const response = await fetch('/api/resize', { method: 'POST', body: formData });
                    if (!response.ok) throw new Error('Lỗi từ máy chủ Backend');
                    
                    const blob = await response.blob();
                    if (resizedPdfUrl) URL.revokeObjectURL(resizedPdfUrl);
                    resizedPdfUrl = URL.createObjectURL(blob);
                }

                // Thành công: Hiển thị kết quả
                loading.classList.add('hidden');
                resizedPreview.src = resizedPdfUrl;
                resizedPreview.classList.remove('hidden');
                openResizedBtn.classList.remove('hidden');
                downloadBtn.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert('Xảy ra lỗi trong quá trình xử lý! ' + error.message);
                loading.classList.add('hidden');
                resizedPlaceholder.classList.remove('hidden');
            }
        });

        openResizedBtn.addEventListener('click', () => {
            if (resizedPdfUrl) window.open(resizedPdfUrl, '_blank');
        });

        downloadBtn.addEventListener('click', () => {
            if (!resizedPdfUrl) return;
            window.open(resizedPdfUrl, '_blank');
            const a = document.createElement('a');
            a.href = resizedPdfUrl;
            a.download = `Resized_${formatSelect.value}.pdf`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
